<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Pedido de Pizza</h1>
    <form action="">
        <fieldset>
            <legend>La pizza</legend>
            <p>Ingredientes</p>
            <input type="checkbox" name="Queso" id="" checked> Queso <br>
            <input type="checkbox" name="Pimiento" id=""> Pimiento <br>
            <input type="checkbox" name="Cebolla" id=""> Cebolla <br>
            <p>Tamaño</p>
            <input type="radio" name="Tamaño" id="" checked> Pequeña <br>
            <input type="radio" name="Tamaño" id=""> Mediana <br>
            <input type="radio" name="Tamaño" id=""> Grande <br>            
        </fieldset>
        <fieldset>
            <legend>Datos de entrega</legend>
            Nombre<input type="text" size="15"> <br>
            Dirección<input type="text" size="35"> <br>
            Teléfono<input type="text" size="11" maxlength="9"> <br>
            Instrucciones especiales <br>
            <textarea name="Instrucciones_especiales" id="" cols="30" rows="10"></textarea>
        </fieldset>
        <fieldset>
            <legend>Método de pago</legend>
            <select name="Pago" id="">
                <option value="1">Efectivo</option>
                <option value="2">Tarjeta</option>
                <option value="3">PayPal</option>
            </select>
        </fieldset>
        <input type="submit" value="Ok">
    </form>
</body>
</html>
