<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <h1 align="center">Formulario de Alta</h1>
    <form action="mailto:correo@correo.es" method="get" enctype="text/plain">
        <fieldset style="margin-right: 520px; margin-left: 520px;">
        <table align="center">
            <tr style="vertical-align: top;">
                <td width="400px">
                    <h3>Nombre y Apellido <span style="color: red;">*</span></h3>
                    <input type="text" name="nombre" id=""><br><br><label for="nombre">Nombre</label><br><br>
                    <input type="text" name="papellido" id=""><br><br><label for="papellido">Primer apellido</label><br><br>
                    <input type="text" name="sapellido" id=""><br><br><label for="sapellido">Segundo Apellido</label><br><br>
                </td>
                <td width="400px">
                    <h3>Dirección <span style="color: red;">*</span></h3>
                    <input type="text" name="cnpp" id=""><br><br><label for="cnpp"> Calle, número, piso, puerta</label><br><br>
                    <input type="text" name="codPostal" id=""><br><br><label for="codPostal"> Código Postal</label><br><br>
                    <input type="text" name="municipio" id=""><br><br><label for="municipio"> Municipio</label><br><br>
                    <select name="provincia" id="">
                        <option value="1">Provincia 1</option>
                        <option value="2">Provincia 2</option>
                        <option value="3">Provincia 3</option>
                    </select>&nbsp;
                    <select name="pais" id="">
                        <option value="1">País 1</option>
                        <option value="2">País 2</option>
                        <option value="3">País 3</option>
                    </select><br><br>
                    <label for="provincia">Provincia</label>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<label for="pais">País</label>
                </td>
            </tr>
            <tr style="vertical-align: top;">
                <td>
                    <h3>Email <span style="color: red;">*</span></h3>
                    <input type="email" name="email" id="">
                </td>
                <td>
                    <h3>Teléfono <span style="color: red;">*</span></h3>
                    <input type="number" name="telefonof" id="">
                    <input type="number" name="telefonom" id=""><br>
                    <label for="telefonof">Fijo</label>&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp;
                    <label for="telefonom">Móvil</label>
                </td>
            </tr>
        </table><br>
        <input type="submit" value="Enviar">
        </fieldset>
    </form>
</body>
</html>
