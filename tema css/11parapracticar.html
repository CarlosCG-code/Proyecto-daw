<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <title> Ejemplo uso de span </title>
    <style type="text/css">
    span.ventaja { color:red; }
</style>
</head>
<body>
    <h1> Cita de Benjamin Franklin</h1>
    <p>El que pronto se acuesta y pronto se levanta, es hombre saludable,
    rico y sabio.</p><br/><br/>
    <p>El que pronto se acuesta y pronto se levanta, es hombre <span class="ventaja">saludable</span>,<span class="ventaja">rico</span> y <span class="ventaja">sabio</span>.</p>
</body>
</html>
