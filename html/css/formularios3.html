<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <form action="mailto:correo@correo.es" method="get" enctype="text/plain">
        <label for="des_turísticos">Destinos turísticos: </label>
            <select name="des_turísticos" id="">
                <optgroup label="Europa">
                    <option value="1">París</option>
                    <option value="2">Berlín</option>
                    <option value="3">Roma</option>
                    <option value="4">Ámsterdam</option>                    
                </optgroup>
                <optgroup label="America">
                    <option value="1">Río de Janeiro</option>
                    <option value="2">La Habana</option>
                    <option value="3">Punta Cana</option>
                    <option value="4">Nueva York</option>                    
                </optgroup>
                <optgroup label="África">
                    <option value="1">Súdafrica</option>
                    <option value="2">Kenia</option>
                    <option value="3">Tanzania</option>
                    <option value="4">Egipto</option>
                </optgroup>
                <optgroup label="Asia">
                    <option value="1">Vietnam</option>
                    <option value="2">Japón</option>
                    <option value="3">China</option>
                    <option value="4">Tailandia</option>                    
                </optgroup>
                <optgroup label="Oceania">
                    <option value="1">Islas Fiyi</option>
                    <option value="2">Australia</option>
                    <option value="3">Nueva Zelanda</option>
                </optgroup>
            </select><br>
    </form>
</body>
</html>
